# Central gateway — port 80
#   /         → storefront
#   /admin/   → admin panel
#   /api/...  → backend (full path preserved, e.g. /api/auth/login)

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream storefront {
    server frontend:80;
}

upstream admin_panel {
    server admin:80;
}

upstream api_backend {
    server backend:4000;
}

server {
    listen 80;
    server_name localhost 16.16.115.136 _;
    

    client_max_body_size 20m;

    # —— API: pass full URI to backend (/api/auth/login, not /auth/login) ——
    location ^~ /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;
    }

    location = /api {
        return 301 /api/;
    }

    # —— Admin panel ——
    location = /admin {
        return 301 /admin/;
    }

    location ^~ /admin/ {
        proxy_pass http://admin_panel/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # —— Storefront ——
    location / {
        proxy_pass http://storefront;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Cookie $http_cookie;
    }
}
