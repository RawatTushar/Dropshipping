# Central gateway — single public port :80
#   http://16.171.135.147/          → storefront (frontend)
#   http://16.171.135.147/admin/    → admin panel
#   http://16.171.135.147/api/      → Express API (backend)
# MongoDB: internal only at mongo:27017 (not HTTP — backend connects directly)

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream storefront {
    server frontend:80;
}

upstream admin_panel {
    server admin:80;
}

upstream api_backend {
    server backend:4000;
}

server {
    listen 80;
    server_name localhost 16.171.135.147 _;

    client_max_body_size 20m;

    # —— API ——
    location = /api {
        return 301 /api/;
    }

    location /api/ {
        proxy_pass http://api_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_cache_bypass $http_pragma $http_cache_control;
    }

    # —— Admin panel (Vite base /admin/) ——
    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://admin_panel/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # —— Storefront (React SPA) ——
    location / {
        proxy_pass http://storefront;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Cookie $http_cookie;
    }
}
