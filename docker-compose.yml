services:
  gateway:
    build:
      context: ./gateway-nginx
    container_name: dropshipping-gateway
    ports:
      - "80:80"
    depends_on:
      - frontend
      - admin
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: dropshipping-mongo
    restart: unless-stopped
    expose:
      - "27017"
    # Optional: MongoDB Compass / mongosh from your machine (not via port 80)
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: dropshipping-backend
    expose:
      - "4000"
    env_file:
      - ./backend/.env
    environment:
      COOKIE_SECURE: "false"
      FRONTEND_URL: ${FRONTEND_URL:-http://16.171.135.147}
      CLIENT_URL: ${CLIENT_URL:-http://16.171.135.147/admin}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://16.171.135.147}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: /api
    container_name: dropshipping-frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: ./AdminPanel
      args:
        VITE_API_URL: ""
    container_name: dropshipping-admin
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
