services:
  mongo:
    profiles: [local-mongo]
    image: mongo:7
    container_name: dropshipping-mongo  
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: http://localhost:5173
      CLIENT_URL: http://localhost:3001
    depends_on:
      mongo:
        condition: service_healthy
        required: false
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: /api
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: ./AdminPanel
      args:
        VITE_API_URL: ""
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
