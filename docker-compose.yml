services:

  gateway:
    build:
      context: ./gateway-nginx
    container_name: dropshipping-gateway
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_healthy
      admin:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s



  backend:
    build:
      context: ./backend
    container_name: dropshipping-backend
    ports:
      - "4000:4000"
    env_file:
      - /opt/env/backend.env
    environment:
      PORT: "4000"
      COOKIE_SECURE: "false"
      FRONTEND_URL: ${FRONTEND_URL:-http://16.16.115.136}
      CLIENT_URL: ${CLIENT_URL:-http://16.16.115.136/admin}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://16.16.115.136}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s


  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: /api
    container_name: dropshipping-frontend
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  admin:
    build:
      context: ./AdminPanel
      args:
        VITE_API_URL: ""
    container_name: dropshipping-admin
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

