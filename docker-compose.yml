services:

  gateway:
    build:
      context: ./gateway-nginx
    container_name: dropshipping-gateway
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_healthy
      admin:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mongo:
    image: mongo:7
    container_name: dropshipping-mongo
    restart: unless-stopped
    expose:
      - "27017"
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: dropshipping-backend
    expose:
      - "4000"
    env_file:
      - /opt/env/backend.env
    environment:
      COOKIE_SECURE: "false"
      FRONTEND_URL: ${FRONTEND_URL:-http://16.171.37.166}
      CLIENT_URL: ${CLIENT_URL:-http://16.171.37.166/admin}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://16.171.37.166}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: /api
    container_name: dropshipping-frontend
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  admin:
    build:
      context: ./AdminPanel
      args:
        VITE_API_URL: ""
    container_name: dropshipping-admin
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data: