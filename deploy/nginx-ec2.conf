# Optional: host nginx on EC2 when the gateway container already binds :80, you usually
# do NOT need this file — open http://<ec2-ip> directly.
#
# Use this only if you want TLS termination or a second proxy in front of Docker.

server {
    listen 80;
    server_name your-ec2-public-ip;

    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }
}
