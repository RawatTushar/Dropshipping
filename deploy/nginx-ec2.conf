# EC2 public IP: 16.171.135.147
# Docker gateway already binds :80 — open http://16.171.135.147/ after `docker compose up -d`
#
# Use this file ONLY if you add a second nginx on the host (e.g. TLS on :443).

server {
    listen 80;
    server_name 16.171.135.147;

    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }
}
