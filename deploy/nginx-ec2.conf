# Host nginx on EC2 (install at /etc/nginx/sites-available/dropshipping)
# Prereqs: docker compose up — frontend on :5173, backend on :4000
# Replace server_name with your EC2 public IP or domain.

server {
    listen 80;
    server_name your-ec2-public-ip;

    # Storefront (Docker frontend container → host port 5173)
    location / {
        proxy_pass http://localhost:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API (Docker backend → host port 4000; use 5000 if PORT=5000 in backend/.env)
    location /api {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }
}

