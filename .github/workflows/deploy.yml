name: Deploy Dropshipping App

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-ec2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            PROJECT_DIR="${{ secrets.EC2_PROJECT_PATH }}"
            if [ -z "$PROJECT_DIR" ]; then
              PROJECT_DIR="$HOME/Dropshipping"
            fi

            echo "==> Using project directory: $PROJECT_DIR"
            cd "$PROJECT_DIR"

            if [ ! -f docker-compose.yml ]; then
              echo "ERROR: docker-compose.yml not found in $PROJECT_DIR"
              echo "Clone the repo first: git clone <your-repo-url> $PROJECT_DIR"
              exit 1
            fi

            if [ ! -f backend/.env ]; then
              echo "ERROR: backend/.env is missing on the server."
              echo "Create it once on EC2 (Mongo URI, JWT_SECRET, FRONTEND_URL, etc.) — do not commit .env to git."
              exit 1
            fi

            echo "==> Pulling latest code from main"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Stopping containers"
            docker compose down --remove-orphans

            echo "==> Pruning unused Docker data (images only)"
            docker image prune -f

            echo "==> Building and starting stack (gateway, frontend, admin, backend, mongo)"
            docker compose build --no-cache frontend admin backend gateway
            docker compose up -d --remove-orphans

            echo "==> Waiting for backend health"
            sleep 15
            for i in 1 2 3 4 5; do
              if curl -fsS http://127.0.0.1/api/health >/dev/null 2>&1; then
                echo "==> API health check passed"
                break
              fi
              echo "==> Health check attempt $i failed, retrying..."
              sleep 5
            done

            curl -fsS http://127.0.0.1/api/health || {
              echo "WARNING: /api/health did not respond. Check: docker compose logs backend"
            }

            echo "==> Running containers"
            docker compose ps

            echo "==> Deploy finished"
            echo "Store:  http://${{ secrets.EC2_HOST }}/"
            echo "Admin:  http://${{ secrets.EC2_HOST }}/admin/"
            echo "API:    http://${{ secrets.EC2_HOST }}/api/health"
